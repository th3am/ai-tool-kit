<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTech Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/all.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
      extend: {
      colors: {
      primary: "#7C3AED",
      secondary: "#06B6D4",
          },
        },
      },
    };
  </script>

  <style>
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }
    .fade-in.opacity-100 {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body
  class="min-h-screen font-sans relative bg-gray-100 text-gray-800 dark:bg-[#060b21] dark:text-white overflow-x-hidden 
  overflow-y-auto flex items-center justify-center transition-colors duration-500 px-4 sm:px-6 md:px-8">
  
  <button
    id="toggleDark"
    class="absolute top-4 right-4 z-50 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 px-3 py-1 rounded-lg text-sm 
    sm:top-6 sm:right-6">🌙 / ☀️</button>

  
 <!-- Decorative gradient wave backgrounds -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
       <!-- Top-right wave -->
      <svg class="absolute -top-40 -right-40 w-[800px] h-[800px] opacity-30 wave-animate-1" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
          </linearGradient>
          <filter id="noise1">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
            <feColorMatrix type="saturate" values="0" />
            <feBlend mode="multiply" in="SourceGraphic" />
          </filter>
        </defs>
        <path d="M 0 400 Q 200 300 400 400 T 800 400 L 800 0 L 0 0 Z" fill="url(#grad1)" filter="url(#noise1)" />
      </svg>
      
       <!-- Bottom-left wave -->
      <svg class="absolute -bottom-40 -left-40 w-[700px] h-[700px] opacity-25 wave-animate-2" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="grad2" x1="100%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
          </linearGradient>
          <filter id="noise2">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" />
            <feColorMatrix type="saturate" values="0" />
            <feBlend mode="multiply" in="SourceGraphic" />
          </filter>
        </defs>
        <path d="M 0 300 Q 175 200 350 300 T 700 300 L 700 700 L 0 700 Z" fill="url(#grad2)" filter="url(#noise2)" />
      </svg>
      
      <div class="absolute inset-0 backdrop-blur-3xl"></div>
    </div>

  <div class="flex flex-col lg:flex-row items-center justify-center lg:justify-between w-full max-w-6xl
   mx-auto relative z-10 py-10 fade-in">
  
    <div class="flex-1 text-center lg:text-left mb-10 lg:mb-0 px-4 sm:px-6 md:px-8 lg:pr-12">
      <h1
        class="text-4xl sm:text-5xl lg:text-6xl font-bold mb-4 lg:-mt-[105px] bg-gradient-to-r from-[#B58BF6] via-[#6366f1] to-[#2ACDF0] 
      dark:from-[#B58BF6] dark:to-[#2ACDF0] bg-clip-text text-transparent transition-colors duration-500">
        EduTech Platform
      </h1>
      <h2 class="text-xl sm:text-2xl font-semibold mb-4">Start your learning journey</h2>
      <p
        class="text-gray-600 dark:text-gray-300 mb-8 leading-relaxed max-w-md mx-auto lg:mx-0 transition-colors duration-500"
      >
        Join thousands of learners transforming their skills with our cutting-edge education tools and resources.
      </p>
      <ul class="space-y-3 text-gray-600 dark:text-gray-300 text-base">
        <li class="flex items-center justify-center lg:justify-start gap-2">
          <i class="fa-solid fa-check-circle text-green-500 dark:text-green-400 text-lg"></i>
          <span>Free to start</span>
        </li>
        <li class="flex items-center justify-center lg:justify-start gap-2">
          <i class="fa-solid fa-check-circle text-green-500 dark:text-green-400 text-lg"></i>
          <span>No credit card required</span>
        </li>
      </ul>
    </div>

    <div class="flex-1 w-full max-w-md px-4 sm:px-6 md:px-0">
      <div
        class="relative backdrop-blur-3xl bg-white/50
       dark:bg-white/10  rounded-2xl p-6 sm:p-8 md:p-10 
      border border-gray-200 dark:border-white/5 transition-all duration-700 ease-in-out">
        <div
          class="absolute inset-0 bg-gradient-to-b from-transparent via-white/20 to-white/40
     dark:via-[#060b21]/10 dark:to-[#060b21]/40 rounded-2xl pointer-events-none transition-all duration-700"
        ></div>
        <h2 class="text-3xl font-semibold mb-2 relative z-10">Create Account</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-6 text-md relative z-10">Get started with your free account</p>



<form class="space-y-5 relative z-10">

  <h2 class="text-2xl font-semibold mb-4">Welcome back</h2>

  <div>
    <label class="flex items-center gap-2 text-lg mb-1">
      <i class="fa-regular fa-envelope text-blue-500 dark:text-blue-400"></i> Email Address
    </label>
    <input
      type="email" required placeholder="you@example.com"
      class="w-full py-2.5 bg-[#DBDDE9] dark:bg-white/10 text-gray-800 dark:text-white 
      px-4 pb-4 rounded-lg outline-none placeholder-gray-400 dark:placeholder-gray-500 
      focus:ring-2 focus:ring-blue-500 transition"/>
  </div>

  <div>
    <label class="flex items-center gap-2 text-lg mb-1">
      <i class="fa-solid fa-lock text-blue-500 dark:text-blue-400"></i> Password
    </label>
    <div class="relative">
      <input
        id="password" type="password" required placeholder="........"
        class="w-full py-2.5 bg-[#DBDDE9] dark:bg-white/10 text-gray-800 dark:text-white 
        placeholder:text-[40px] placeholder-gray-400 dark:placeholder-gray-500 
        px-4 pb-4  rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition" />
      <i id="togglePassword"
         class="fa-regular fa-eye absolute right-3 top-1/2 -translate-y-1/2 
         text-gray-500 dark:text-gray-400 cursor-pointer"></i>
    </div>
  </div>

  <button
    type="submit"
    class="w-full bg-gradient-to-r from-[#3b82f6] to-[#6366f1] hover:from-[#2563eb] hover:to-[#4f46e5] 
    text-white py-2.5 mt-4 pb-3 text-lg  rounded-lg font-semibold transition-all duration-200 shadow-lg">
    Sign in
  </button>

  <p class="text-center text-gray-600 dark:text-gray-400 text-sm">
    Don't have an account?
    <a href="#" class="text-blue-500 dark:text-blue-400 hover:underline">Sign Up</a>
  </p>

  <button
    type="button"
    class="w-full flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-600 
    py-2.5 pb-4 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 
    transition-all duration-200">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google icon" />
    Sign in with Google
  </button>

</form>

      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="signin.js"></script>
</body>
</html>
